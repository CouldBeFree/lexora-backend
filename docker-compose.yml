services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexora-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${PORT:-3010}:${PORT:-3010}"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: lexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexora}
      POSTGRES_USER: ${POSTGRES_USER:-lexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexora_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexora} -d ${POSTGRES_DB:-lexora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: lexora-postgres-data
