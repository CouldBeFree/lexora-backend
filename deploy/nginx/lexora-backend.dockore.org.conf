# Lexora backend API — public reverse-proxy vhost for the edge-nginx container.
#
# Deploy: copy this file to /opt/edge-nginx/conf.d/ on the server, then:
#   docker exec -it edge-nginx nginx -t
#   docker exec -it edge-nginx nginx -s reload
#
# edge-nginx reaches the API by container name `lexora-api` over the shared
# Docker network (the `edge` network the api container joins). TLS is the
# wildcard *.dockore.org origin cert mounted inside the edge-nginx container.

server {
    listen 80;
    server_name lexora-backend.dockore.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lexora-backend.dockore.org;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    location / {
        proxy_pass http://lexora-api:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
